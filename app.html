<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>语迹 VoiceLog · Web 桌面版</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #fff; overflow: hidden; }
  body { font-family: -apple-system, "PingFang SC", system-ui, sans-serif; }
  #root { height: 100vh; height: 100dvh; width: 100%; position: relative; overflow: hidden; }
  #splash { position: fixed; inset: 0; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; background: #0c0c0e; transition: opacity .4s ease; }
  #splash .lg { width: 80px; height: 80px; border-radius: 22px; background: #3f7afe; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 34px rgba(0,0,0,.45); animation: splpop .5s ease both; }
  #splash .nm { color: #fff; font-size: 24px; font-weight: 800; letter-spacing: -0.3px; }
  #splash .nm span { color: #9db8ff; }
  #splash .sl { color: rgba(255,255,255,.5); font-size: 13px; }
  #splash .dots { margin-top: 6px; width: 26px; height: 26px; border: 2.5px solid rgba(255,255,255,.18); border-top-color: rgba(255,255,255,.7); border-radius: 999px; animation: splspin .8s linear infinite; }
  @keyframes splpop { from { transform: scale(.8); opacity: 0 } to { transform: none; opacity: 1 } }
  @keyframes splspin { to { transform: rotate(360deg) } }
</style>
</head>
<body>
<div id="splash">
  <div class="lg"><svg width="44" height="44" viewBox="0 0 24 24" fill="none"><rect x="2.5" y="9" width="3" height="6" rx="1.5" fill="#fff"/><rect x="7.5" y="4" width="3" height="16" rx="1.5" fill="#fff"/><rect x="12.5" y="6.5" width="3" height="11" rx="1.5" fill="#fff"/><rect x="17.5" y="10" width="3" height="4" rx="1.5" fill="#fff"/></svg></div>
  <div class="nm">语迹 <span>VoiceLog</span></div>
  <div class="sl">时间是你最大的资产</div>
  <div class="dots"></div>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- 数据 / 令牌（普通脚本，先于 Babel 执行） -->
<script src="project/app/tokens.js"></script>
<script src="project/app/data.js"></script>
<script src="project/app/parser.js"></script>

<!-- 组件（Babel 按序编译） -->
<script type="text/babel" src="project/app/icons.jsx"></script>
<script type="text/babel" src="project/app/ui.jsx"></script>
<script type="text/babel" src="project/app/screens-home.jsx"></script>
<script type="text/babel" src="project/app/screens-overview.jsx"></script>
<script type="text/babel" src="project/app/screens-review.jsx"></script>
<script type="text/babel" src="project/app/screens-export.jsx"></script>
<script type="text/babel" src="project/app/screens-growth.jsx"></script>
<script type="text/babel" src="project/webapp/web-calendar.jsx"></script>
<script type="text/babel" src="project/webapp/web-voice.jsx"></script>
<script type="text/babel" src="project/webapp/web-celebrate.jsx"></script>
<script type="text/babel" src="project/webapp/web-growth.jsx"></script>
<script type="text/babel" src="project/webapp/web-welcome.jsx"></script>
<script type="text/babel" src="project/webapp/web-app.jsx"></script>

<script type="text/babel" data-presets="react">
  const Web = window.VoiceLogWeb;
  const themes = window.VL.themes;
  // Web 应用内置「设置」里可切换三套主题方向，这里给个默认即可
  ReactDOM.createRoot(document.getElementById('root')).render(<Web theme={themes.cloud} />);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const s = document.getElementById('splash');
    if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 450); }
  }));
</script>
</body>
</html>
