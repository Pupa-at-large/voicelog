name: Build macOS app

# 打一个 v* 的 tag（或手动触发）就在 GitHub 的 macOS 机器上构建 .dmg 并发到 Releases。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest   # Apple 芯片(arm64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install + build (precompile + electron-builder)
        working-directory: desktop
        run: |
          npm install
          npm run dist
      - name: List artifacts
        run: ls -la desktop/release || true
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 语迹 VoiceLog ${{ github.ref_name }}
          body: |
            语迹 VoiceLog · macOS 桌面版（Apple 芯片 / arm64）。
            未签名：首次打开请用「右键→打开」或「系统设置 → 隐私与安全性 → 仍要打开」。
          files: |
            desktop/release/*.dmg
            desktop/release/*.zip
