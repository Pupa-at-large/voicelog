<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>语迹 VoiceLog · 手机版</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0c0c0e; }
  body { font-family: -apple-system, "PingFang SC", system-ui, sans-serif; }
  /* 手机优先：占满整屏；在桌面上居中成一台手机宽 */
  #root { height: 100vh; width: 100%; max-width: 440px; margin: 0 auto; position: relative; overflow: hidden; background: #fff; }
  /* 顶部主题切换条（轻量、不挡内容） */
  #themebar { position: fixed; top: 0; left: 50%; transform: translateX(-50%); z-index: 9999;
    display: flex; gap: 6px; padding: 6px 8px; background: rgba(20,20,24,.55); backdrop-filter: blur(8px);
    border-radius: 0 0 14px 14px; }
  #themebar button { border: 0; border-radius: 999px; padding: 4px 12px; font-size: 13px; cursor: pointer;
    background: rgba(255,255,255,.18); color: #fff; }
  #themebar button.on { background: #fff; color: #111; font-weight: 600; }
</style>
</head>
<body>
<div id="themebar"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- 数据 / 令牌（普通脚本，先于 Babel 执行） -->
<script src="project/app/tokens.js"></script>
<script src="project/app/data.js"></script>
<script src="project/app/parser.js"></script>

<!-- 组件（Babel 按序编译） -->
<script type="text/babel" src="project/frames/ios-frame.jsx"></script>
<script type="text/babel" src="project/app/icons.jsx"></script>
<script type="text/babel" src="project/app/ui.jsx"></script>
<script type="text/babel" src="project/app/screens-home.jsx"></script>
<script type="text/babel" src="project/app/screens-overview.jsx"></script>
<script type="text/babel" src="project/app/screens-review.jsx"></script>
<script type="text/babel" src="project/app/screens-export.jsx"></script>
<script type="text/babel" src="project/app/screens-growth.jsx"></script>
<script type="text/babel" src="project/app/VoiceLogApp.jsx"></script>

<script type="text/babel" data-presets="react">
  const App_ = window.VoiceLogApp;
  const themes = window.VL.themes;
  const LABELS = { cloud: '云', dawn: '暖', night: '夜' };

  function Mobile() {
    // 记住上次选的主题方向（和 app 自身按主题分库的存储一致）
    const [key, setKey] = React.useState(() => localStorage.getItem('voicelog:lastTheme') || 'cloud');
    const theme = themes[key] || themes.cloud;
    React.useEffect(() => { localStorage.setItem('voicelog:lastTheme', key); }, [key]);

    // 渲染顶部主题条到独立容器（避免被 app 内部布局裁切）
    React.useEffect(() => {
      const bar = document.getElementById('themebar');
      bar.innerHTML = '';
      Object.keys(LABELS).forEach((k) => {
        const b = document.createElement('button');
        b.textContent = LABELS[k];
        if (k === key) b.className = 'on';
        b.onclick = () => setKey(k);
        bar.appendChild(b);
      });
    }, [key]);

    // 用 theme.key 作 React key，切主题时整树重挂（让 app 读取对应主题的本地存储）
    return <App_ key={theme.key} theme={theme} />;
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Mobile />);
</script>
</body>
</html>
